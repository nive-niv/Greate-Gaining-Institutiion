<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson – Great Gaining Institution</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .lesson-wrap { max-width: 900px; margin: 80px auto 60px; padding: 0 20px; }
        .lesson-header { margin-bottom: 24px; }
        .lesson-header h1 { font-size: 1.6rem; color: #1a1a2e; margin: 8px 0 4px; }
        .lesson-header p  { color: #666; font-size: 0.9rem; }
        .lesson-back { display:inline-flex; align-items:center; gap:6px; color:#7c4daa; font-size:0.88rem; font-weight:600; text-decoration:none; margin-bottom:16px; }
        .lesson-back:hover { text-decoration:underline; }
        .no-pdf { display:flex; flex-direction:column; align-items:center; justify-content:center; height:40vh; background:#f8f4ff; border:1.5px dashed #b39ddb; border-radius:14px; color:#9e9e9e; text-align:center; padding:40px; }
        .no-pdf i { font-size:3rem; color:#b39ddb; margin-bottom:16px; }
        .no-pdf h3 { color:#1a1a2e; margin-bottom:8px; }
        .complete-bar { display:flex; justify-content:space-between; align-items:center; margin-top:20px; background:#f8f4ff; border:1.5px solid #e0d4f5; border-radius:12px; padding:16px 24px; flex-wrap:wrap; gap:12px; }
        .complete-bar .mod-info { font-size:0.9rem; color:#555; }
        .complete-bar .mod-info strong { color:#1a1a2e; }
        .btn-complete { padding:12px 32px; background:linear-gradient(135deg,#1a1a2e,#2d2d5e); color:#fff; border:none; border-radius:10px; font-size:0.95rem; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; display:flex; align-items:center; gap:8px; }
        .btn-complete:hover { opacity:0.9; }
        .btn-complete.done { background:linear-gradient(135deg,#38a169,#276749); cursor:default; }
        .in-progress-badge { display:flex; align-items:center; gap:8px; padding:12px 24px; background:#fff8e1; border:1.5px solid #f6c90e; border-radius:10px; color:#b7791f; font-size:0.9rem; font-weight:600; }
        .tag { display:inline-block; padding:4px 12px; border-radius:20px; font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; }
        .tag-lesson { background:#e8f4fd; color:#2b6cb0; }
        .tag-task   { background:#fef3c7; color:#92400e; }
        .lesson-content-box { background:#fff; border:1.5px solid #e0d4f5; border-radius:14px; padding:28px 32px; line-height:1.8; }
        .lesson-content-box a { color:#7c4daa; font-weight:600; }
    </style>
</head>
<body>

<nav class="navbar">
    <h2><img src="loo.png" alt="Logo" class="navbar-logo">Great Gaining Institution</h2>
    <button class="nav-toggle" onclick="this.parentElement.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="course.html">Courses</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="dashboard.html">Dashboard</a>
    </div>
    <div class="user-info" id="userInfo"><a href="login.html">Login</a></div>
</nav>

<div class="lesson-wrap">
    <a href="dashboard.html" class="lesson-back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>

    <div class="lesson-header">
        <span class="tag" id="lessonTag">Lesson</span>
        <h1 id="lessonTitle">Loading...</h1>
        <p id="lessonCourse"></p>
    </div>

    <div id="pdfArea"></div>

    <div class="complete-bar">
        <div class="mod-info">
            <strong id="barTitle"></strong><br>
            <span id="barCourse"></span>
        </div>
        <!-- In Progress badge — shown until a study link is clicked -->
        <div class="in-progress-badge" id="inProgressBadge" style="display:none;">
            <i class="fas fa-spinner fa-spin"></i> In Progress &nbsp;—&nbsp; Open a study link to unlock completion
        </div>
        <!-- Mark as Complete button — shown only after a study link is clicked -->
        <button class="btn-complete" id="completeBtn" onclick="markComplete()" style="display:none;">
            <i class="fas fa-check"></i> Mark as Complete
        </button>
    </div>
</div>

<script src="Script.js"></script>
<script>
    const params   = new URLSearchParams(location.search);
    const course   = params.get('course');
    const modIndex = parseInt(params.get('mod'));
    const email    = localStorage.getItem('gg_email');

    if (!course || isNaN(modIndex)) window.location.href = 'dashboard.html';

    const modTitle = params.get('title') || 'Lesson';
    const modType  = params.get('type')  || 'lesson';

    document.getElementById('lessonTitle').textContent  = modTitle;
    document.getElementById('lessonCourse').textContent = course;
    document.getElementById('barTitle').textContent     = modTitle;
    document.getElementById('barCourse').textContent    = course;
    document.title = modTitle + ' – GG Web';

    const tagEl = document.getElementById('lessonTag');
    tagEl.textContent = modType === 'task' ? 'Task' : 'Lesson';
    tagEl.className   = 'tag tag-' + modType;

    // localStorage key to track if any study link was clicked
    const linkClickedKey = 'gg_linkclicked_' + email + '_' + course + '_' + modIndex;

    // ── Render lesson content ──────────────────────────────────────────────
    const pdfArea = document.getElementById('pdfArea');

    function renderContent() {
        const mod = (typeof SYLLABUS !== 'undefined' && SYLLABUS[course])
            ? SYLLABUS[course][modIndex] : null;

        if (mod && mod.content) {
            pdfArea.innerHTML = '<div class="lesson-content-box">' + mod.content + '</div>';

            // Listen for clicks on any study material link inside the content
            pdfArea.querySelectorAll('a[target="_blank"]').forEach(function(link) {
                link.addEventListener('click', function() {
                    localStorage.setItem(linkClickedKey, '1');
                    updateBar();
                });
            });
        } else {
            pdfArea.innerHTML =
                '<div class="no-pdf">' +
                '<i class="fas fa-file-pdf"></i>' +
                '<h3>Content Coming Soon</h3>' +
                '<p>The study material for this module will be uploaded shortly.</p>' +
                '</div>';
        }
    }

    // ── Show/hide button vs badge based on link-clicked state ─────────────
    function updateBar() {
        const clicked = localStorage.getItem(linkClickedKey) === '1';
        document.getElementById('completeBtn').style.display      = clicked ? 'flex' : 'none';
        document.getElementById('inProgressBadge').style.display  = clicked ? 'none' : 'flex';
    }

    // ── Check if already completed via API ────────────────────────────────
    fetch('/api/dashboard?email=' + encodeURIComponent(email))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var done = (data.progress || []).some(function(p) {
                return p.course_name === course &&
                       parseInt(p.module_index) === modIndex &&
                       p.completed;
            });
            var btn    = document.getElementById('completeBtn');
            var badge  = document.getElementById('inProgressBadge');
            if (done) {
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Completed';
                btn.classList.add('done');
                btn.style.display   = 'flex';
                btn.onclick         = null;
                badge.style.display = 'none';
            } else {
                updateBar();
            }
        })
        .catch(function() { updateBar(); });

    renderContent();

    // ── Mark as Complete ──────────────────────────────────────────────────
    function markComplete() {
        var btn = document.getElementById('completeBtn');
        btn.disabled  = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

        fetch('/api/progress', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, course_name: course, module_index: modIndex })
        })
        .then(function(r) { return r.json(); })
        .then(function() {
            btn.innerHTML = '<i class="fas fa-check-circle"></i> Completed!';
            btn.classList.add('done');
            btn.onclick = null;
            setTimeout(function() { window.location.href = 'dashboard.html'; }, 1200);
        })
        .catch(function() {
            btn.disabled  = false;
            btn.innerHTML = '<i class="fas fa-check"></i> Mark as Complete';
        });
    }
</script>
</body>
</html>
