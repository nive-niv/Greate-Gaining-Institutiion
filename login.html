<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Great Gaining Institution</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body class="auth-body">

<nav class="navbar">
    <h2><img src="mmm.png" alt="Logo" class="navbar-logo">Great Gaining Institution</h2>
    <button class="nav-toggle" onclick="this.parentElement.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="course.html">Courses</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="dashboard.html">Dashboard</a>
    </div>
    <div class="user-info" id="userInfo">
        <a href="login.html">Login</a>
    </div>
    <button class="dark-mode-toggle" id="darkModeToggle" onclick="toggleDarkMode()" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
</nav>

<div class="auth-wrap">
<div class="auth-container">
    <div class="auth-logo">Great Gaining Institution</div>
    <h2>Welcome Back</h2>

    <div style="margin-bottom:6px;font-size:0.75rem;font-weight:700;color:#9e9e9e;letter-spacing:0.1em;text-transform:uppercase;">Login as</div>
    <div class="role-selector">
        <label class="role-option selected" id="roleStudent" onclick="selectRole('student')">
            <input type="radio" name="role" value="student" checked>
            <i class="fas fa-user-graduate"></i>
            <span>Student</span>
        </label>
        <label class="role-option" id="roleAdmin" onclick="selectRole('admin')">
            <input type="radio" name="role" value="admin">
            <i class="fas fa-user-shield"></i>
            <span>Admin</span>
        </label>
    </div>

    <form onsubmit="return loginUser()">
        <div class="form-group">
            <label>Email / Username</label>
            <input type="text" id="username" placeholder="Enter your email" required autocomplete="username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <div style="text-align:right;margin:-8px 0 16px;">
            <a href="forgot-password.html" style="font-size:0.82rem;color:#7c4daa;text-decoration:none;font-weight:600;">Forgot Password?</a>
        </div>

        <!-- reCAPTCHA -->
        <div style="display:flex;justify-content:center;margin-bottom:16px;">
            <div class="g-recaptcha" data-sitekey="6LcNpuksAAAAAMfOXrpl4Z9-Q9RzqFvWgmlxheui"></div>
        </div>

        <p id="login-error" style="color:#dc2626;font-size:0.83rem;margin-bottom:8px;min-height:18px;"></p>
        <button type="submit" class="form-submit">Login →</button>
    </form>

    <!-- Divider -->
    <div style="display:flex;align-items:center;gap:12px;margin:18px 0 4px;">
        <div style="flex:1;height:1px;background:#e0d4f5;"></div>
        <span style="font-size:0.78rem;color:#9e9e9e;font-weight:500;">or</span>
        <div style="flex:1;height:1px;background:#e0d4f5;"></div>
    </div>

    <!-- Google Sign-In -->
    <div id="g_id_onload"
         data-client_id="328437935179-lf88d5h4gaaf2u3q4kgp5s3n8ecnt6cm.apps.googleusercontent.com"
         data-callback="handleGoogleLogin"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="continue_with"
         data-shape="rectangular"
         data-logo_alignment="left"
         style="display:flex;justify-content:center;margin-top:8px;">
    </div>

    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
</div>
</div>

<script src="Script.js"></script>
<script>
function selectRole(role) {
    document.getElementById('roleStudent').classList.toggle('selected', role==='student');
    document.getElementById('roleAdmin').classList.toggle('selected', role==='admin');
    localStorage.setItem('gg_selected_role', role);
}
function getSelectedRole() {
    return localStorage.getItem('gg_selected_role') || 'student';
}
function getLockKey(u)  { return 'gg_lock_' + u; }
function getAttKey(u)   { return 'gg_att_'  + u; }

function startLockCountdown(userKey, errEl) {
    const btn = document.querySelector('.form-submit');
    if (btn) { btn.disabled = true; btn.style.opacity = '0.5'; }
    const timer = setInterval(() => {
        const d = JSON.parse(localStorage.getItem(getLockKey(userKey)) || 'null');
        if (!d) {
            clearInterval(timer);
            if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
            if (errEl) errEl.innerHTML = '✅ Account unlocked. You can try again now.';
            grecaptcha.reset();
            return;
        }
        const rem = Math.ceil((d.until - Date.now()) / 1000);
        if (rem <= 0) {
            clearInterval(timer);
            localStorage.removeItem(getLockKey(userKey));
            localStorage.removeItem(getAttKey(userKey));
            if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
            if (errEl) errEl.innerHTML = '✅ Account unlocked. You can try again now.';
            grecaptcha.reset();
        } else {
            const m = Math.floor(rem / 60), s = rem % 60;
            if (errEl) errEl.innerHTML = '🔒 Account locked. Try again in <b>' + m + 'm ' + s + 's</b>.';
        }
    }, 1000);
}

window.loginUser = function() {
    clearAllErrors();
    const user  = document.getElementById('username').value.trim();
    const pass  = document.getElementById('password').value;
    const errEl = document.getElementById('login-error');
    let valid = true;
    if (!user) { setError('username','Email is required'); valid=false; }
    if (!pass) { setError('password','Password is required'); valid=false; }
    if (!valid) return false;

    // Check lockout
    const lockData = JSON.parse(localStorage.getItem(getLockKey(user)) || 'null');
    if (lockData) {
        const rem = Math.ceil((lockData.until - Date.now()) / 1000);
        if (rem > 0) {
            const m = Math.floor(rem / 60), s = rem % 60;
            if (errEl) errEl.innerHTML = '🔒 Account locked due to multiple failed attempts.<br>Try again in <b>' + m + 'm ' + s + 's</b>.';
            startLockCountdown(user, errEl);
            return false;
        } else {
            localStorage.removeItem(getLockKey(user));
            localStorage.removeItem(getAttKey(user));
        }
    }

    // Check reCAPTCHA
    const captcha = grecaptcha.getResponse();
    if (!captcha) {
        if (errEl) errEl.textContent = 'Please complete the CAPTCHA verification.';
        return false;
    }

    if (errEl) errEl.textContent = '';
    const role = getSelectedRole();
    fetch('/api/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email:user, password:pass, role})
    }).then(r=>r.json()).then(data=>{
        if (data.error) {
            let attempts = parseInt(localStorage.getItem(getAttKey(user)) || '0') + 1;
            localStorage.setItem(getAttKey(user), attempts);

            // Send security alert email on every failed attempt
            fetch('/api/login-alert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: user, attempt: attempts })
            }).catch(() => {});

            if (attempts >= 4) {
                localStorage.setItem(getLockKey(user), JSON.stringify({ until: Date.now() + 5*60*1000 }));
                localStorage.removeItem(getAttKey(user));
                if (errEl) errEl.innerHTML = '🚨 Security Alert! Too many failed attempts.<br>Login is <b>locked for 5 minutes</b>.';
                startLockCountdown(user, errEl);
            } else {
                const left = 4 - attempts;
                setError('password', data.error);
                if (errEl) errEl.innerHTML = '❌ ' + data.error + ' &nbsp;(<b>' + left + ' attempt' + (left===1?'':'s') + ' remaining</b>)';
            }
            grecaptcha.reset();
            return;
        }
        localStorage.removeItem(getLockKey(user));
        localStorage.removeItem(getAttKey(user));
        localStorage.setItem('gg_loggedIn', data.user.full_name);
        localStorage.setItem('gg_email', data.user.email);
        // Use role from DB first, fall back to selected role
        const finalRole = (data.user.role && data.user.role !== 'undefined') ? data.user.role : role;
        localStorage.setItem('gg_role', finalRole);
        showToast('Welcome back, '+data.user.full_name+'!');
        setTimeout(()=>{ window.location.href = finalRole === 'admin' ? 'admin.html' : 'dashboard.html'; }, 1000);
    }).catch(()=>{ showToast('Server error. Please try again.','error'); grecaptcha.reset(); });
    return false;
};
function handleGoogleLogin(response) {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const name  = payload.name  || payload.given_name || 'User';
    const email = payload.email || '';
    const role  = getSelectedRole();
    fetch('/api/google-login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ full_name: name, email, role })
    }).then(r=>r.json()).then(data=>{
        if (data.error) { showToast(data.error,'error'); return; }
        localStorage.setItem('gg_loggedIn', data.user.full_name);
        localStorage.setItem('gg_email',    data.user.email);
        const gFinalRole = (data.user.role && data.user.role !== 'undefined') ? data.user.role : role;
        localStorage.setItem('gg_role', gFinalRole);
        showToast('Welcome, '+data.user.full_name+'!');
        setTimeout(()=>{ window.location.href = gFinalRole === 'admin' ? 'admin.html' : 'dashboard.html'; }, 1000);
    }).catch(()=>showToast('Google login failed. Try again.','error'));
}
document.addEventListener('DOMContentLoaded',()=>{
    const saved = localStorage.getItem('gg_selected_role') || 'student';
    selectRole(saved);
    if (localStorage.getItem('gg_theme')==='dark') {
        document.body.classList.add('dark-mode');
        const t=document.getElementById('darkModeToggle');
        if(t) t.innerHTML='<i class="fas fa-sun"></i>';
    }
    // Restore lockout on page reload
    const emailVal = document.getElementById('username').value.trim();
    document.getElementById('username').addEventListener('blur', function() {
        const u = this.value.trim();
        if (!u) return;
        const d = JSON.parse(localStorage.getItem(getLockKey(u)) || 'null');
        if (d && d.until > Date.now()) {
            const errEl = document.getElementById('login-error');
            startLockCountdown(u, errEl);
        }
    });
});
function toggleDarkMode(){
    const isDark = document.body.classList.toggle('dark-mode');
    localStorage.setItem('gg_theme', isDark?'dark':'light');
    const t=document.getElementById('darkModeToggle');
    if(t) t.innerHTML = isDark?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';
}
</script>
</body>
</html>
